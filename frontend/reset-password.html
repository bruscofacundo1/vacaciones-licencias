<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña — GerenciAndo Canales</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root {
  --bg:#fafafa;--bg-2:#ffffff;--bg-3:#f4f4f4;
  --ink:#1a1a1a;--ink-2:#3a3a3a;
  --muted:#888888;--muted-2:#b5b5b5;
  --line:#e5e5e5;
  --ok:#1f7a3f;--ok-bg:#e8f3ec;
  --bad:#a2261c;--bad-bg:#fae8e6;
  --radius:6px;--radius-lg:10px;
  --shadow-lg:0 20px 50px rgba(0,0,0,0.12),0 8px 16px rgba(0,0,0,0.06);
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

.page{width:100%;max-width:400px;padding:20px;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:36px;}
.logo-mark{width:36px;height:36px;border-radius:var(--radius);background:var(--ink);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;letter-spacing:-.5px;font-family:var(--mono);}
.logo-text{font-size:15px;font-weight:600;line-height:1.2;}
.logo-text small{display:block;font-size:12px;font-weight:400;color:var(--muted);}

/* Card */
.card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-lg);padding:32px;box-shadow:var(--shadow-lg);}
.card-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}

/* Form */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.form-input{width:100%;height:40px;padding:0 13px;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;transition:border-color .12s;}
.form-input:focus{border-color:var(--ink);background:var(--bg-2);}
.form-input::placeholder{color:var(--muted-2);}

/* Button */
.btn-submit{width:100%;height:40px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:background .12s;}
.btn-submit:hover{background:#000;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.btn-back{width:100%;height:40px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .12s;}
.btn-back:hover{background:var(--bg-3);border-color:var(--muted-2);}

/* Spinner */
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Message */
.msg{display:none;padding:10px 13px;border-radius:var(--radius);font-size:13px;margin-top:12px;line-height:1.5;}
.msg.success{background:var(--ok-bg);border:1px solid #b8d9c3;color:var(--ok);}
.msg.error{background:var(--bad-bg);border:1px solid #e8b9b5;color:var(--bad);}

/* Expired panel */
.expired{text-align:center;padding:8px 0;}
.expired-icon{width:48px;height:48px;border-radius:50%;background:var(--bad-bg);color:var(--bad);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.expired h2{font-size:17px;font-weight:700;margin-bottom:6px;}
.expired p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}

/* Back link */
.back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted);cursor:pointer;transition:color .12s;}
.back-link:hover{color:var(--ink);}
</style>
</head>
<body>

<div class="page">
  <div class="logo">
    <div class="logo-mark">GC</div>
    <div class="logo-text">GerenciAndo<small>Canales · Licencias</small></div>
  </div>

  <div class="card">
    <!-- Panel formulario -->
    <div id="panel-form">
      <div class="card-title">Nueva contraseña</div>
      <div class="card-sub">Elegí una contraseña de al menos 6 caracteres.</div>

      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" class="form-input" id="pass-nueva" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-input" id="pass-confirm" placeholder="Repetí la contraseña" onkeydown="if(event.key==='Enter')resetear()">
      </div>

      <button class="btn-submit" id="btn-reset" onclick="resetear()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Guardar contraseña</span>
      </button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- Panel token inválido / expirado -->
    <div id="panel-expirado" style="display:none">
      <div class="expired">
        <div class="expired-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <h2>Link inválido o expirado</h2>
        <p>El link tiene validez de 1 hora. Solicitá uno nuevo desde la pantalla de login.</p>
        <button class="btn-back" onclick="location.href='login.html'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
          Ir al login
        </button>
      </div>
    </div>
  </div>

  <a class="back-link" onclick="location.href='login.html'">← Volver al login</a>
</div>

<script>
const API = window.API_URL;
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('panel-form').style.display = 'none';
  document.getElementById('panel-expirado').style.display = 'block';
}

async function resetear() {
  const nueva   = document.getElementById('pass-nueva').value;
  const confirm = document.getElementById('pass-confirm').value;

  if (!nueva || !confirm) { showMsg('Completá los dos campos', 'error'); return; }
  if (nueva.length < 6)   { showMsg('Mínimo 6 caracteres', 'error'); return; }
  if (nueva !== confirm)  { showMsg('Las contraseñas no coinciden', 'error'); return; }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('btn-text').style.display = 'none';

  try {
    const r = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, passwordNueva: nueva }),
    });
    const data = await r.json();

    if (!r.ok) {
      if (r.status === 400) {
        document.getElementById('panel-form').style.display = 'none';
        document.getElementById('panel-expirado').style.display = 'block';
      } else {
        showMsg(data.error || 'Error al actualizar', 'error');
      }
      return;
    }

    showMsg('Contraseña actualizada correctamente. Redirigiendo...', 'success');
    setTimeout(() => location.href = 'login.html', 2500);
  } catch(e) {
    showMsg('Error de conexión. Verificá que el servidor esté disponible.', 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('btn-text').style.display = 'block';
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className   = `msg ${type}`;
  el.style.display = 'block';
}
</script>
</body>
</html>
