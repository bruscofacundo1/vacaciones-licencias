<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GerenciAndo Canales — Nueva contraseña</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0a17;--bg2:#160f24;--card:#1a1228;
    --border:rgba(124,58,173,0.25);--border2:rgba(124,58,173,0.5);
    --purple:#7c3aad;--accent:#b344e0;--pale:#c49de0;
    --text:#f0e8ff;--text2:#b8a8d4;--text3:#7a6896;
    --green:#34d399;--red:#f87171;--red-bg:rgba(248,113,113,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,173,0.15),transparent 70%);pointer-events:none;}
  .wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px;animation:fadeUp 0.5s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
  .logo-bars{display:flex;gap:3px;align-items:flex-end;}
  .logo-bars span{display:block;width:5px;border-radius:3px;background:linear-gradient(180deg,#b344e0,#7c3aad);}
  .logo-bars span:nth-child(1){height:16px;}.logo-bars span:nth-child(2){height:24px;}.logo-bars span:nth-child(3){height:18px;}.logo-bars span:nth-child(4){height:28px;}.logo-bars span:nth-child(5){height:20px;}
  .logo-text{font-family:'Syne',sans-serif;line-height:1.1;}
  .logo-text strong{font-size:20px;font-weight:700;color:var(--pale);display:block;}
  .logo-text em{font-style:normal;font-size:13px;color:var(--text3);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,0.4);}
  .card-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
  .card-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
  .form-group{margin-bottom:16px;}
  .form-label{display:block;font-size:12px;font-weight:500;color:var(--text3);margin-bottom:6px;}
  .form-input{width:100%;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;}
  .form-input:focus{border-color:var(--purple);}
  .form-input::placeholder{color:var(--text3);}
  .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--purple),var(--accent));color:white;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,58,173,0.35);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,58,173,0.5);}
  .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{display:none;padding:11px 14px;border-radius:9px;font-size:13px;margin-top:14px;}
  .msg.success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);color:var(--green);}
  .msg.error{background:var(--red-bg);border:1px solid rgba(248,113,113,0.2);color:var(--red);}
  .back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--text3);cursor:pointer;}
  .back-link:hover{color:var(--text2);}
</style>
<script src="config.js"></script></head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-bars"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="logo-text"><strong>GerenciAndo</strong><em>Canales · Licencias</em></div>
  </div>
  <div class="card">
    <div id="panel-form">
      <div class="card-title">Nueva contraseña</div>
      <div class="card-sub">Elegí una contraseña de al menos 6 caracteres</div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" class="form-input" id="pass-nueva" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-input" id="pass-confirm" placeholder="Repetí la contraseña" onkeydown="if(event.key==='Enter')resetear()">
      </div>
      <button class="btn" id="btn-reset" onclick="resetear()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Guardar contraseña</span>
      </button>
      <div class="msg" id="msg"></div>
    </div>
    <div id="panel-expirado" style="display:none;text-align:center;padding:10px 0">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px">Link inválido o expirado</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:20px">El link tiene validez de 1 hora. Solicitá uno nuevo.</div>
      <button class="btn" onclick="window.location.href='login.html'">Volver al login</button>
    </div>
  </div>
  <a class="back-link" onclick="window.location.href='login.html'">← Volver al login</a>
</div>
<script>
  const API = window.API_URL;
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    document.getElementById('panel-form').style.display = 'none';
    document.getElementById('panel-expirado').style.display = 'block';
  }

  async function resetear() {
    const nueva   = document.getElementById('pass-nueva').value;
    const confirm = document.getElementById('pass-confirm').value;
    const msg     = document.getElementById('msg');

    if (!nueva || !confirm) { showMsg('Completá los dos campos', 'error'); return; }
    if (nueva.length < 6)   { showMsg('Mínimo 6 caracteres', 'error'); return; }
    if (nueva !== confirm)  { showMsg('Las contraseñas no coinciden', 'error'); return; }

    const btn = document.getElementById('btn-reset');
    btn.disabled = true;
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('btn-text').style.display = 'none';

    try {
      const r = await fetch(`${API}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, passwordNueva: nueva }),
      });
      const data = await r.json();

      if (!r.ok) {
        if (r.status === 400) {
          document.getElementById('panel-form').style.display = 'none';
          document.getElementById('panel-expirado').style.display = 'block';
        } else {
          showMsg(data.error || 'Error al actualizar', 'error');
        }
        return;
      }

      showMsg('✅ ¡Contraseña actualizada! Redirigiendo...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2500);
    } catch(e) {
      showMsg('Error de conexión. Verificá que el servidor esté corriendo.', 'error');
    } finally {
      btn.disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-text').style.display = 'block';
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = `msg ${type}`;
    el.style.display = 'block';
  }
</script>
</body>
</html>
